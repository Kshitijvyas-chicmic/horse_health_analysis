version: "3.9"

services:
  # ---------------- API ----------------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: horse_health_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./mmpose/work_dirs:/app/mmpose/work_dirs:ro
    depends_on:
      - mlflow
    restart: unless-stopped

  # ---------------- Training ----------------
  trainer:
    build:
      context: .
      dockerfile: docker/training/Dockerfile
    container_name: horse_health_trainer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    volumes:
      - .:/app
      - ./datasets:/app/datasets
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    command: tail -f /dev/null

  # ---------------- MLflow ----------------
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: horse_health_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlruns/mlflow.db --default-artifact-root /mlruns
    restart: unless-stopped

  # ---------------- n8n ----------------
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: horse_health_n8n
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./datasets:/datasets
      - ./models:/models
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    restart: always

networks:
  default:
    name: horse_health_network
